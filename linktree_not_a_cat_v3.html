<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>not a cat at all</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    overflow: hidden;
    background: #0a1018;
  }

  .bg {
    position: absolute;
    inset: 0;
    background-image: url('bg.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.72) saturate(0.9);
    z-index: 0;
  }

  .bg-veil {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(140,210,240,0.04) 0%, rgba(10,16,24,0.45) 70%);
    z-index: 1;
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(12, 20, 30, 0.62);
    border: 1px solid rgba(140, 210, 240, 0.13);
    border-radius: 24px;
    padding: 2.2rem 1.8rem 1.9rem;
    width: 320px;
    backdrop-filter: blur(28px) saturate(1.2);
    -webkit-backdrop-filter: blur(28px) saturate(1.2);
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 24px 64px rgba(0,0,0,0.55),
      0 0 80px rgba(100,190,230,0.06);
  }

  .avatar-wrap {
    width: 86px;
    height: 86px;
    border-radius: 50%;
    margin: 0 auto 1.15rem;
    position: relative;
  }

  .avatar-glow {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(140,210,240,0.22) 0%, transparent 70%);
    z-index: 0;
  }

  .avatar-border {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(140, 210, 240, 0.28);
    z-index: 2;
  }

  .avatar-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background: #0d1a26;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
  }

  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: #ddeef7;
    letter-spacing: 0.01em;
    margin-bottom: 0.3rem;
  }

  .bio {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    color: rgba(180, 215, 235, 0.45);
    letter-spacing: 0.04em;
    margin-bottom: 1.7rem;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    cursor: pointer;
    width: 100%;
    text-align: left;
    background: none;
  }

  .btn-instagram {
    background: rgba(255, 140, 130, 0.08);
    border-color: rgba(255, 140, 130, 0.18);
    color: #ffb3ac;
  }
  .btn-instagram:hover {
    background: rgba(255, 140, 130, 0.15);
    border-color: rgba(255, 140, 130, 0.35);
    transform: translateY(-1px);
  }

  .btn-discord {
    background: rgba(110, 175, 220, 0.08);
    border-color: rgba(110, 175, 220, 0.18);
    flex-direction: column;
    align-items: flex-start;
    gap: 7px;
    cursor: default;
  }
  .btn-discord:hover {
    background: rgba(110, 175, 220, 0.12);
  }

  .discord-top {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #a8d4ee;
  }

  .discord-username-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0.38rem 0.6rem;
    background: rgba(255,255,255,0.04);
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .discord-username {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 300;
    color: rgba(180, 215, 235, 0.55);
    letter-spacing: 0.02em;
  }

  .copy-btn {
    background: none;
    border: none;
    color: rgba(140, 200, 235, 0.5);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    line-height: 1;
  }

  .copy-btn:hover {
    color: rgba(140, 200, 235, 0.9);
    background: rgba(140, 200, 235, 0.1);
  }

  .copy-btn.copied {
    color: rgba(130, 220, 160, 0.85);
  }

  .copy-btn svg {
    width: 14px;
    height: 14px;
  }

  .link-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 300;
    color: rgba(140, 180, 210, 0.2);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-veil"></div>

<div class="card">

  <div class="avatar-wrap">
    <div class="avatar-glow"></div>
    <div class="avatar-inner">
      <img src="avatar.jpg" alt="profile" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
      <span style="display:none;">🐾</span>
    </div>
    <div class="avatar-border"></div>
  </div>

  <div class="name">not a cat at all</div>
  <div class="bio">i need to sleep</div>

  <div class="links">

    <a href="https://www.instagram.com/lilshadebug/" target="_blank" class="link-btn btn-instagram">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
      instagram
    </a>

    <div class="link-btn btn-discord">
      <div class="discord-top">
        <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        discord
      </div>
      <div class="discord-username-row">
        <span class="discord-username">hell_veticaa</span>
        <button class="copy-btn" onclick="copyDiscord(this)" title="copy username">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <div class="footer">severely unimpressed with life</div>
</div>

<script>
function copyDiscord(btn) {
  navigator.clipboard.writeText('hell_veticaa').then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    }, 2000);
  });
}
</script>

</body>
</html>
